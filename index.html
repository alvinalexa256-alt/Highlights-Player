<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sports 803 - Live Sports Streaming</title>

  <!-- Primary Meta -->

  <meta name="description" content="Watch live sports streams on Sports 803. Free HD streaming for football, soccer, and more." />

  <!-- Open Graph (Facebook, Reddit) -->

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Sports 803 - Live Sports Streaming" />
  <meta property="og:description" content="Watch live sports streams on Sports 803. Free HD streaming for football, soccer, and more." />
  <meta property="og:image" content="https://livetv.wtvpc.com/wp-content/uploads/2017/06/tv-image.gif" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://alvinalexa256-alt.github.io/Highlights-Player/" />
  <meta property="og:site_name" content="Sports 803" />

  <!-- Twitter Card -->

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Sports 803 - Live Sports Streaming" />
  <meta name="twitter:description" content="Watch live sports streams on Sports 803. Free HD streaming for football, soccer, and more." />
  <meta name="twitter:image" content="https://livetv.wtvpc.com/wp-content/uploads/2017/06/tv-image.gif" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      color: #fff;
    }
    .wrap { text-align: center; padding: 20px; }
    .logo { font-size: 28px; font-weight: bold; color: #e63b2e; margin-bottom: 10px; }
    .msg { font-size: 15px; color: #aaa; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #e63b2e;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
    }
    .countdown { margin-top: 16px; font-size: 13px; color: #666; }
  </style>

</head>
<body>
  <div class="wrap">
    <div class="logo">&#9917; Sports 803</div>
    <div class="msg">Redirecting you to the stream&hellip;</div>
    <a id="watchBtn" class="btn" href="#">&#9654; Watch Now</a>
    <div class="countdown">Redirecting in <span id="sec">3</span>s</div>
  </div>

  <script>
    var DEFAULT_URL = "https://sports803livestream.blogspot.com";
    var params = new URLSearchParams(window.location.search);
    var embed = params.get("embed");
    var target = embed ? decodeURIComponent(embed) : DEFAULT_URL;

    if (!/^https?:\/\//i.test(target)) target = DEFAULT_URL;

    document.getElementById("watchBtn").href = target;

    var sec = 3;
    var el = document.getElementById("sec");
    var timer = setInterval(function () {
      sec--;
      el.textContent = sec;
      if (sec <= 0) {
        clearInterval(timer);
        window.location.href = target;
      }
    }, 1000);
  </script>

</body>
</html>
